	<link rel="icon" type="image/png" href="salas/imagens/icone.png">

  <body>
<div style='color:#fada91; position: fixed; bottom: 1vh; left:1vw; width:100%; z-index: 1; font-family: Lato; font-size:2.5vh; font-weight:bold; text-shadow:1px 1px 1px royalblue;'>paulohscwb@gmail.com <br> &copy; 2026 Paulo Henrique Siqueira</div>
    <a-scene renderer="logarithmicDepthBuffer: true; colorManagement: true;">
		<a-assets>
			<a-mixin id="mtl9" material="color: #8ec; side:double;"></a-mixin>
			<a-mixin id="esfera" mixin="mtl9" geometry="radius: 0.0328; segments-height:20; segments-width:20;" material="metalness:0.4; roughness:0.5;">

			<a-asset-item id="poliw" src="obj/03_Octagyraugmented_OctahedronL.obj"></a-asset-item>
		</a-assets>

			<a-light type="point" color="white" intensity="0.5" position="0 0 0"></a-light>
			<a-obj-model id="fc" src="#poli" mtl="#material" scale="0.995 0.995 0.995"></a-obj-model>
			<a-obj-model id="ar" src="#poliw" mtl="#m1"></a-obj-model>
			<a-sphere mixin='esfera' position='0 0 -0.7071067811865482'></a-sphere>
			<a-sphere mixin='esfera' position='0 0.7071067811865478 0'></a-sphere>
			<a-sphere mixin='esfera' position='0 0 0.7071067811865482'></a-sphere>
			<a-sphere mixin='esfera' position='0 -0.7071067811865479 0'></a-sphere>
			<a-sphere mixin='esfera' position='-0.7071067811865482 0 0'></a-sphere>
			<a-sphere mixin='esfera' position='0.9428090415820633 0.2357022603955161 -0.9428090415820645'></a-sphere>
			<a-sphere mixin='esfera' position='0.9428090415820635 0.9428090415820636 -0.235702260395517'></a-sphere>
			<a-sphere mixin='esfera' position='0.2357022603955157 0.9428090415820633 -0.9428090415820645'></a-sphere>
			<a-sphere mixin='esfera' position='0.942809041582064 0.2357022603955168 0.9428090415820633'></a-sphere>

			<a-sphere mixin='esfera' position='0.2357022603955172 -0.9428090415820628 0.9428090415820645'></a-sphere>

			<a-sphere mixin='esfera' position='0.707106781186548 0 0'></a-sphere>
		</a-entity>
		
		<a-box mixin="piso" class="piso" visible="false" position="0 -1.5 0"></a-box>
		<a-entity id="cameraRig" position="0 0 11">
			<a-entity camera="fov:1; near:0.001;" id="head" orbit-controls="target: 0 0 0; maxPolarAngle: 180; minDistance: 0.5; initialPosition: 0 350 700; maxDistance: 1500;"></a-entity>
			<a-entity teleport-controls="cameraRig: #cameraRig; collisionEntities: [mixin='piso']; teleportOrigin: #head; button: grip;" hand-controls="hand: right"></a-entity>
		</a-entity>
	  
		<a-light type="ambient" color="white" intensity="0.5"></a-light>
		<a-light type="directional" color="white" intensity="0.8" position="-3 2 1"></a-light>
		<a-light type="directional" color="white" intensity="0.8" position="3 -2 1"></a-light>

		<a-sky color="#f6fff6"></a-sky>
    </a-scene>
	<div class="box">
		<span class="titulo">Octagyrated augmented octahedron</span>
		<br><span class="titulo">Octaedro aumentado octagirado</span>
		<hr><input type="checkbox" id="faces" checked onclick="mfaces()">faces&nbsp;&nbsp;&nbsp;  
		<input type="checkbox" id="arestas" checked onclick="marestas()">edges&nbsp;&nbsp;&nbsp; 
		<input type="checkbox" id="vertices" checked onclick="mvertices()">vertices
