<html>
  <head>
    <title>Deltahedra</title>
	<meta charset="utf-8">
	<link rel="icon" type="image/png" href="salas/imagens/icone.png">
	<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
	<script src="https://unpkg.com/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
	<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
	<script src="nomes.js"></script>
	<link rel="stylesheet" href="nomes.css">
 	<script src="https://unpkg.com/aframe-teleport-controls@0.3.x/dist/aframe-teleport-controls.min.js"></script>
  </head>
  <body>
<div style='color:#fada91; position: fixed; bottom: 1vh; left:1vw; width:100%; z-index: 1; font-family: Lato; font-size:2.5vh; font-weight:bold; text-shadow:1px 1px 1px royalblue;'>paulohscwb@gmail.com <br> &copy; 2026 Paulo Henrique Siqueira</div>
    <a-scene renderer="logarithmicDepthBuffer: true; colorManagement: true;">
		<a-assets>
			<a-mixin id="mtl9" material="color: #8ed; side:double;"></a-mixin>
			<a-mixin id="esfera" mixin="mtl9" geometry="radius: 0.0276; segments-height:20; segments-width:20;" material="metalness:0.4; roughness:0.5;">
			<a-asset-item id="material" src="https://paulohscwb.github.io/polyhedra2/fractalnonconvex/vr/outros/c1.mtl"></a-asset-item>
			<a-asset-item id="m1" src="https://paulohscwb.github.io/SacredGeometry/symbols/vr/outros/c8.mtl"></a-asset-item>
			<a-asset-item id="poli" src="obj/02_Tetragyraugmented_Tetrahedron.obj"></a-asset-item>
			<a-asset-item id="poliw" src="obj/02_Tetragyraugmented_TetrahedronL.obj"></a-asset-item>
		</a-assets>
		
		<a-entity rotation="-19.5 0 0" scale="5 5 5">
			<a-obj-model id="fc" src="#poli" mtl="#material" scale="0.995 0.995 0.995"></a-obj-model>
			<a-obj-model id="ar" src="#poliw" mtl="#material"></a-obj-model>
			<a-sphere mixin='esfera' position='0 -0.577350269189626 -0.2041241452319317'></a-sphere>
			<a-sphere mixin='esfera' position='-0.5000000000000002 0.2886751345948128 -0.2041241452319316'></a-sphere>
			<a-sphere mixin='esfera' position='0 0 0.6123724356957948'></a-sphere>
			<a-sphere mixin='esfera' position='0.5 -0.2886751345948129 -1.020620726159658'></a-sphere>
			<a-sphere mixin='esfera' position='0 0.5773502691896255 -1.020620726159658'></a-sphere>
			<a-sphere mixin='esfera' position='-0.5000000000000001 -0.2886751345948131 -1.020620726159658'></a-sphere>
			<a-sphere mixin='esfera' position='0.4999999999999999 0.8660254037844394 0.6123724356957937'></a-sphere>
			<a-sphere mixin='esfera' position='-0.4999999999999997 0.8660254037844398 0.6123724356957936'></a-sphere>
			<a-sphere mixin='esfera' position='0 1.154700538379252 -0.2041241452319324'></a-sphere>
			<a-sphere mixin='esfera' position='0.5000000000000009 -0.866025403784438 0.612372435695796'></a-sphere>
			<a-sphere mixin='esfera' position='0.9999999999999998 0 0.6123724356957957'></a-sphere>
			<a-sphere mixin='esfera' position='1.000000000000001 -0.5773502691896253 -0.2041241452319301'></a-sphere>
			<a-sphere mixin='esfera' position='-1 -0.5773502691896258 -0.2041241452319301'></a-sphere>
			<a-sphere mixin='esfera' position='-0.9999999999999998 0 0.6123724356957955'></a-sphere>
			<a-sphere mixin='esfera' position='-0.5000000000000004 -0.8660254037844387 0.6123724356957959'></a-sphere>
			<a-sphere mixin='esfera' position='0.5000000000000003 0.2886751345948129 -0.2041241452319316'></a-sphere>
		</a-entity>
		
		<a-box mixin="piso" class="piso" visible="false" position="0 -1.5 0"></a-box>
		<a-entity id="cameraRig" position="0 0 11">
			<a-entity camera="fov:1; near:0.001;" id="head" orbit-controls="target: 0 0 0; maxPolarAngle: 180; minDistance: 0.5; initialPosition: 0 350 700; maxDistance: 1500;"></a-entity>
			<a-entity teleport-controls="cameraRig: #cameraRig; collisionEntities: [mixin='piso']; teleportOrigin: #head; button: grip;" hand-controls="hand: right"></a-entity>
		</a-entity>
	  
		<a-light type="ambient" color="white" intensity="0.5"></a-light>
		<a-light type="directional" color="white" intensity="0.45" position="-7 5 1"></a-light>
		<a-light type="directional" color="white" intensity="0.45" position="7 -5 1"></a-light>
		<a-light type="directional" color="white" intensity="0.45" position="7 5 -1"></a-light>

		<a-sky color="#f6fff6"></a-sky>
    </a-scene>
	<div class="box">
		<span class="titulo">Tetra-gyrate augmented tetrahedron</span>
		<br><span class="titulo">Tetraedro tetra-girado aumentado</span>
		<hr><input type="checkbox" id="faces" checked onclick="mfaces()">faces&nbsp;&nbsp;&nbsp;  
		<input type="checkbox" id="arestas" checked onclick="marestas()">edges&nbsp;&nbsp;&nbsp; 
		<input type="checkbox" id="vertices" checked onclick="mvertices()">vertices
	</div>
  </body>
</html>
